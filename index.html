<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>芋泥啵啵奶茶☕️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fff1f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 380px;
      height: 600px;
      background: white;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .header {
      background: #ff6f9c;
      color: white;
      padding: 14px;
      text-align: center;
      font-weight: bold;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px;
      padding: 10px;
      border-radius: 12px;
      max-width: 80%;
      white-space: pre-wrap;
    }

    .user {
      background: #dff3ff;
      margin-left: auto;
    }

    .ai {
      background: #ffe3ec;
      margin-right: auto;
    }

    .input {
      display: flex;
      border-top: 1px solid #eee;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      border: none;
      background: #ff3f7f;
      color: white;
      padding: 10px 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="header">芋泥啵啵奶茶☕️</div>

  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="input" placeholder="和奶茶说点什么..." />
    <button id="sendBtn">发送</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const btn = document.getElementById("sendBtn");

let history = [];

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMsg("user", text);
  inputEl.value = "";

  history.push({ role: "user", content: text });

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });

    const raw = await res.text();
    console.log("RAW:", raw);

    const data = JSON.parse(raw);

    if (!data.reply) {
      addMsg("ai", "我刚刚卡住了🥺 再说一次好吗");
      return;
    }

    addMsg("ai", data.reply);
    history.push({ role: "assistant", content: data.reply });

  } catch (err) {
    console.error(err);
    addMsg("ai", "网络有点不稳定🥺：" + err.message);
  }
}

btn.addEventListener("click", send);

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
