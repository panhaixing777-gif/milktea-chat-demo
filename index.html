<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>芋泥啵啵奶茶☕️</title>
  <style>
    body {
      font-family: Arial;
      background: #fff3f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-box {
      width: 380px;
      height: 520px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #ffb6c1;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #dff3ff;
      align-self: flex-end;
    }

    .ai {
      background: #ffe4ec;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      border-top: 1px solid #eee;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      background: #ff7aa2;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat-box">
  <div class="header">芋泥啵啵奶茶☕️</div>

  <div id="messages" class="messages"></div>

  <div class="input-box">
    <input id="input" placeholder="说点什么…" />
    <button onclick="send()">发送</button>
  </div>
</div>

<script type="module">
  import { sendMessage } from "./api.chat.js";

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");

  let history = [];

  function append(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.innerText = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  window.send = async function () {
    const text = inputEl.value;
    if (!text) return;

    append("user", text);

    history.push({ role: "user", content: text });

    inputEl.value = "";

    const reply = await sendMessage(history);

    append("ai", reply);

    history.push({ role: "assistant", content: reply });
  };
</script>

</body>
</html>
